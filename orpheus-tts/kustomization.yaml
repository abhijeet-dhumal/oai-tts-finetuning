apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: smartshop

resources:
  - manifests/pvc.yaml
  - manifests/trainjob-orpheus.yaml
  # trainjob-orpheus-eval.yaml is applied manually after training completes:
  #   oc apply -f manifests/trainjob-orpheus-eval.yaml

configMapGenerator:
  - name: orpheus-tts-scripts
    files:
      - train_orpheus.py=scripts/train_orpheus.py
      - evaluate_orpheus.py=scripts/evaluate_orpheus.py
    options:
      disableNameSuffixHash: true
