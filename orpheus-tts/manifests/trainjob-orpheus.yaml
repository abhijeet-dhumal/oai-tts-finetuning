apiVersion: trainer.kubeflow.org/v1alpha1
kind: TrainJob
metadata:
  name: orpheus-turkish-tts
  namespace: smartshop
  labels:
    app: orpheus-turkish-tts
    kueue.x-k8s.io/queue-name: smartshop-training
spec:
  labels:
    kueue.x-k8s.io/queue-name: smartshop-training
  runtimeRef:
    apiGroup: trainer.kubeflow.org
    kind: ClusterTrainingRuntime
    name: torch-distributed-cuda130-torch210-py312
  trainer:
    numNodes: 2
    numProcPerNode: "gpu"   # 1 GPU per node → 2 DDP processes total
    resourcesPerNode:
      requests:
        cpu: "8"
        memory: "48Gi"        # Llama-3B in bf16 ≈ 6GB; headroom for SNAC + batch
        nvidia.com/gpu: "1"
      limits:
        cpu: "16"
        memory: "64Gi"
        nvidia.com/gpu: "1"
    command:
      - bash
      - -c
      - |
        DEPS=/data/orpheus/deps
        DEPS_VER="v7"
        # Invalidate cache if stale torchcodec is present (bad v9 install)
        [ -d $DEPS/torchcodec ] && rm -f $DEPS/.version && echo "[deps] Stale torchcodec — invalidating cache"
        if ! [ -f $DEPS/.version ] || [ "$(cat $DEPS/.version)" != "$DEPS_VER" ]; then
          echo "[deps] Installing $DEPS_VER …"
          find $DEPS -mindepth 1 -delete 2>/dev/null; rm -rf $DEPS/torchcodec $DEPS/torchcodec* 2>/dev/null || true
          mkdir -p $DEPS
          pip install -q --target $DEPS \
            --index-url https://pypi.org/simple/ soundfile einops jiwer
          pip install -q --target $DEPS --no-deps \
            --index-url https://pypi.org/simple/ "snac==1.2.1" openai-whisper
          pip install -q --target $DEPS \
            --index-url https://pypi.org/simple/ tiktoken more-itertools ffmpeg-python \
            || echo "[warn] whisper runtime deps failed"
          echo "$DEPS_VER" > $DEPS/.version
        fi
        export PYTHONPATH=$PYTHONPATH:$DEPS

        PREP_SENTINEL=/data/orpheus/checkpoints/preprocessed/.done
        if [ ! -f $PREP_SENTINEL ]; then
          echo "[preprocess] Node ${PET_NODE_RANK:-0}: processing shard (cap: $PREPROCESS_SAMPLES) …"
          python3 /orpheus-scripts/train_orpheus.py --preprocess --force
        fi
        echo "[preprocess] Waiting for merged dataset (node ${PET_NODE_RANK:-0}) …"
        until [ -f $PREP_SENTINEL ]; do sleep 10; done
        echo "[preprocess] Dataset ready — starting torchrun."

        torchrun /orpheus-scripts/train_orpheus.py
    env:
      # ── Storage paths ────────────────────────────────────────────────────────
      - name: CHECKPOINT_DIR
        value: /data/orpheus/checkpoints/turkish
      - name: HF_HOME
        value: /data/orpheus/hf-cache

      # ── Model / dataset ──────────────────────────────────────────────────────
      - name: BASE_MODEL
        value: "unsloth/orpheus-3b-0.1-pretrained"
      - name: HF_DATASET
        value: "afkfatih/turkish-tts-combined-raw"

      # ── Training hyperparameters ──────────────────────────────────────────────
      - name: BATCH_SIZE
        value: "2"
      - name: GRAD_ACCUM
        value: "4"           # effective global batch = 2×2×4 = 16
      - name: LEARNING_RATE
        value: "1e-4"
      - name: NUM_EPOCHS
        value: "3"
      - name: MAX_SEQ_LEN
        value: "4096"
      - name: PREPROCESS_SAMPLES
        value: "10000"       # tokenise first 10K samples; both nodes share the work
      - name: MAX_TRAIN_SAMPLES
        value: "2000"        # ~2 h smoke run from the preprocessed 10K pool
      - name: SAVE_STEPS
        value: "200"
      - name: LOGGING_STEPS
        value: "5"
      - name: AUDIO_LOG_STEPS
        value: "50"        # smoke run: 1500 steps → 30 eval points; full run: bump to 200
      - name: WHISPER_MODEL
        value: "small"     # small=fast in-training WER; large-v3 used in eval job
      - name: PYTHONUNBUFFERED
        value: "1"
      - name: TQDM_DISABLE
        value: "1"

      # ── MLflow tracking ───────────────────────────────────────────────────────
      - name: MLFLOW_TRACKING_URI
        value: "https://rh-ai.apps.oai-kft-ibm.ibm.rh-ods.com/mlflow"
      - name: MLFLOW_TRACKING_INSECURE_TLS
        value: "true"
      - name: MLFLOW_TRACKING_AUTH
        value: "kubernetes-namespaced"
      - name: MLFLOW_EXPERIMENT
        value: orpheus-turkish-tts
      - name: MLFLOW_TRACKING_TOKEN
        valueFrom:
          secretKeyRef:
            name: smartshop-mlflow-token
            key: MLFLOW_TRACKING_TOKEN

      # ── GPU / runtime ─────────────────────────────────────────────────────────
      - name: PYTORCH_CUDA_ALLOC_CONF
        value: "expandable_segments:True"
      - name: NCCL_BUFFSIZE
        value: "65536"
      - name: NCCL_SOCKET_NTHREADS
        value: "1"
      - name: NCCL_NSOCKS_PERTHREAD
        value: "1"
      - name: NCCL_P2P_DISABLE
        value: "1"
      - name: NCCL_SHM_DISABLE
        value: "1"
      - name: NCCL_DEBUG
        value: "WARN"

      # ── HuggingFace token (from cluster secret) ───────────────────────────────
      - name: HF_TOKEN
        valueFrom:
          secretKeyRef:
            name: hf-credentials
            key: token

  podTemplateOverrides:
    - targetJobs:
        - name: node
      spec:
        serviceAccountName: smartshop-training
        nodeSelector:
          nvidia.com/gpu.present: "true"
        containers:
          - name: node
            volumeMounts:
              - name: data
                mountPath: /data
              - name: orpheus-scripts
                mountPath: /orpheus-scripts
              - name: shm
                mountPath: /dev/shm
        volumes:
          - name: data
            persistentVolumeClaim:
              claimName: orpheus-tts-storage   # dedicated PVC — separate from MMS
          - name: orpheus-scripts
            configMap:
              name: orpheus-tts-scripts
              defaultMode: 0755
          - name: shm
            emptyDir:
              medium: Memory
              sizeLimit: "8Gi"
