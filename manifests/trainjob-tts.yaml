apiVersion: trainer.kubeflow.org/v1alpha1
kind: TrainJob
metadata:
  name: mms-turkish-tts
  namespace: smartshop
  labels:
    app: mms-turkish-tts
    kueue.x-k8s.io/queue-name: smartshop-training
spec:
  labels:
    kueue.x-k8s.io/queue-name: smartshop-training
  runtimeRef:
    apiGroup: trainer.kubeflow.org
    kind: ClusterTrainingRuntime
    name: torch-distributed-cuda130-torch210-py312
  trainer:
    numNodes: 2
    numProcPerNode: "gpu"   # 1 GPU per node → 2 processes total (DDP)
    resourcesPerNode:
      requests:
        cpu: "8"
        memory: "32Gi"
        nvidia.com/gpu: "1"
      limits:
        cpu: "16"
        memory: "64Gi"
        nvidia.com/gpu: "1"
    # torchrun reads PET_NNODES / PET_NODE_RANK / PET_MASTER_ADDR / PET_MASTER_PORT
    # injected by Kubeflow Trainer v2 — no shell wrapper needed (PyTorch >= 2.3).
    command: ["torchrun", "/scripts/train_vits.py"]
    env:
      # ── Storage paths ──────────────────────────────────────────────────────
      - name: DATA_ROOT
        value: /data/tts
      - name: DATASET_DIR
        value: /data/tts/mms-dataset
      - name: CHECKPOINT_DIR
        value: /data/tts/checkpoints/mms-turkish
      - name: HF_HOME
        value: /data/tts/hf-cache

      # ── Training hyperparameters ────────────────────────────────────────────
      # Effective batch = BATCH_SIZE × GRAD_ACCUM × numNodes = 8 × 4 × 2 = 64
      - name: BATCH_SIZE
        value: "8"
      - name: GRAD_ACCUM
        value: "4"
      - name: LEARNING_RATE
        value: "2e-4"
      - name: NUM_EPOCHS
        value: "50"
      - name: MAX_STEPS
        value: ""           # leave empty to use NUM_EPOCHS; set e.g. "10000" to cap
      - name: MAX_TRAIN_SAMPLES
        value: ""           # leave empty for full dataset; set e.g. "5000" for faster iteration
      - name: RESUME_FROM
        value: ""           # path to a previous checkpoint dir to warm-start from
      - name: RUN_EVAL
        value: "true"       # runs evaluate.py on rank 0 after training

      # ── MLflow tracking ────────────────────────────────────────────────────
      - name: MLFLOW_TRACKING_URI
        value: "https://rh-ai.apps.oai-kft-ibm.ibm.rh-ods.com/mlflow"
      - name: MLFLOW_TRACKING_AUTH
        value: "kubernetes-namespaced"
      - name: MLFLOW_TRACKING_INSECURE_TLS
        value: "true"
      - name: MLFLOW_EXPERIMENT
        value: mms-turkish-tts

      # ── GPU / runtime ──────────────────────────────────────────────────────
      - name: PYTORCH_CUDA_ALLOC_CONF
        value: "expandable_segments:True"
      - name: PYTHONPATH
        value: "/deps"      # packages installed by install-deps initContainer

      # ── HuggingFace token (from cluster secret) ────────────────────────────
      - name: HF_TOKEN
        valueFrom:
          secretKeyRef:
            name: hf-credentials
            key: token

  podTemplateOverrides:
    - targetJobs:
        - name: node
      spec:
        serviceAccountName: smartshop-training
        nodeSelector:
          nvidia.com/gpu.present: "true"
        initContainers:
          # ── Step 1: install pip dependencies into a shared emptyDir ──────
          - name: install-deps
            image: "registry.redhat.io/rhoai/odh-th06-cuda130-torch210-py312-rhel9@sha256:551eaedcd6f1337b03ccba34a2a7b1ecb6f7f605646999e4b20461a68b61c0eb"
            command:
              - pip
              - install
              - "--target=/deps"
              - "--quiet"
              - "transformers>=4.40.0"
              - "datasets>=3.0"
              - "accelerate>=0.28.0"
              - soundfile
              - librosa
              - mlflow
              - numpy
              - matplotlib
              - jiwer
              - openai-whisper
            volumeMounts:
              - name: deps
                mountPath: /deps
          # ── Step 2: preprocess dataset (sentinel-guarded, idempotent) ────
          - name: preprocess
            image: "registry.redhat.io/rhoai/odh-th06-cuda130-torch210-py312-rhel9@sha256:551eaedcd6f1337b03ccba34a2a7b1ecb6f7f605646999e4b20461a68b61c0eb"
            command:
              - python3
              - /scripts/preprocess_mms.py
              - "--out_dir=/data/tts/mms-dataset"
              - "--hf_cache=/data/tts/hf-cache"
            env:
              - name: PYTHONPATH
                value: "/deps"
              - name: HF_TOKEN
                valueFrom:
                  secretKeyRef:
                    name: hf-credentials
                    key: token
            volumeMounts:
              - name: data
                mountPath: /data
              - name: scripts
                mountPath: /scripts
              - name: deps
                mountPath: /deps
        containers:
          - name: node
            volumeMounts:
              - name: data
                mountPath: /data
              - name: scripts
                mountPath: /scripts
              - name: shm
                mountPath: /dev/shm
              - name: deps
                mountPath: /deps
        volumes:
          - name: data
            persistentVolumeClaim:
              claimName: smartshop-shared-storage
          - name: scripts
            configMap:
              name: tts-mms-scripts
              defaultMode: 0755
          - name: shm
            emptyDir:
              medium: Memory
              sizeLimit: "8Gi"
          - name: deps
            emptyDir: {}   # shared by initContainers (install/preprocess) and trainer
