apiVersion: trainer.kubeflow.org/v1alpha1
kind: TrainJob
metadata:
  name: mms-turkish-tts
  namespace: smartshop
  labels:
    app: mms-turkish-tts
    kueue.x-k8s.io/queue-name: smartshop-training
spec:
  labels:
    kueue.x-k8s.io/queue-name: smartshop-training
  runtimeRef:
    apiGroup: trainer.kubeflow.org
    kind: ClusterTrainingRuntime
    name: torch-distributed-cuda130-torch210-py312
  trainer:
    numNodes: 2
    numProcPerNode: "gpu"   # 1 GPU per node → 2 processes total (DDP)
    resourcesPerNode:
      requests:
        cpu: "8"
        memory: "32Gi"
        nvidia.com/gpu: "1"
      limits:
        cpu: "16"
        memory: "64Gi"
        nvidia.com/gpu: "1"
    command:
      - bash
      - -c
      - |
        pip install -q --target /deps \
          "transformers>=4.40.0" "datasets>=3.0" "accelerate>=0.28.0" \
          soundfile librosa mlflow numpy matplotlib jiwer openai-whisper
        export PYTHONPATH=/deps:$PYTHONPATH
        torchrun /scripts/train_vits.py
    env:
      # ── Storage paths ──────────────────────────────────────────────────────
      - name: DATA_ROOT
        value: /data/tts
      - name: DATASET_DIR
        value: /data/tts/mms-dataset
      - name: CHECKPOINT_DIR
        value: /data/tts/checkpoints/mms-turkish
      - name: HF_HOME
        value: /data/tts/hf-cache

      # ── Training hyperparameters ────────────────────────────────────────────
      - name: BATCH_SIZE
        value: "8"
      - name: GRAD_ACCUM
        value: "4"
      - name: LEARNING_RATE
        value: "2e-4"
      - name: NUM_EPOCHS
        value: "50"
      - name: MAX_STEPS
        value: ""           # leave empty to use NUM_EPOCHS; set e.g. "5000" for smoke test
      - name: MAX_TRAIN_SAMPLES
        value: ""           # full 81K dataset — enough diversity for 8-GPU training
      - name: RESUME_FROM
        value: "/data/tts/checkpoints/mms-turkish/best"  # warm-start from existing checkpoint
      - name: RUN_EVAL
        value: "true"       # runs evaluate.py on rank 0 after training

      # ── MLflow tracking ────────────────────────────────────────────────────
      - name: MLFLOW_TRACKING_URI
        value: "https://rh-ai.apps.oai-kft-ibm.ibm.rh-ods.com/mlflow"
      - name: MLFLOW_TRACKING_AUTH
        value: "kubernetes-namespaced"
      - name: MLFLOW_TRACKING_INSECURE_TLS
        value: "true"
      - name: MLFLOW_EXPERIMENT
        value: mms-turkish-tts

      # ── GPU / runtime ──────────────────────────────────────────────────────
      - name: PYTORCH_CUDA_ALLOC_CONF
        value: "expandable_segments:True"
      # NCCL tuning for OpenShift OVN-Kubernetes CNI:
      # The CNI delivers TCP in 64KB chunks; NCCL auto-negotiates 1MB on one node
      # and 64KB on the other → "message truncated" crash. Force all ranks to 64KB.
      - name: NCCL_BUFFSIZE
        value: "65536"
      - name: NCCL_SOCKET_NTHREADS
        value: "1"
      - name: NCCL_NSOCKS_PERTHREAD
        value: "1"
      - name: NCCL_P2P_DISABLE
        value: "1"
      - name: NCCL_SHM_DISABLE
        value: "1"
      - name: NCCL_DEBUG
        value: "WARN"

      # ── HuggingFace token (from cluster secret) ────────────────────────────
      - name: HF_TOKEN
        valueFrom:
          secretKeyRef:
            name: hf-credentials
            key: token

  podTemplateOverrides:
    - targetJobs:
        - name: node
      spec:
        serviceAccountName: smartshop-training
        nodeSelector:
          nvidia.com/gpu.present: "true"
        containers:
          - name: node
            volumeMounts:
              - name: data
                mountPath: /data
              - name: scripts
                mountPath: /scripts
              - name: shm
                mountPath: /dev/shm
        volumes:
          - name: data
            persistentVolumeClaim:
              claimName: smartshop-shared-storage
          - name: scripts
            configMap:
              name: tts-mms-scripts
              defaultMode: 0755
          - name: shm
            emptyDir:
              medium: Memory
              sizeLimit: "8Gi"
