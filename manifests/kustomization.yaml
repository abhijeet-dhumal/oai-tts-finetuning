apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: smartshop

resources:
  - trainjob-tts.yaml

# Generates tts-mms-scripts ConfigMap directly from source files.
# Any edit to scripts/ is automatically picked up on the next apply.
configMapGenerator:
  - name: tts-mms-scripts
    options:
      disableNameSuffixHash: true
    files:
      - ../scripts/preprocess_mms.py
      - ../scripts/train_vits.py
      - ../scripts/evaluate.py
