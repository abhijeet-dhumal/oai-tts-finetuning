# 2-node LoRA training (v2 hyperparameters). Requires preprocessed data on PVC.
apiVersion: trainer.kubeflow.org/v1alpha1
kind: TrainJob
metadata:
  name: orpheus-turkish-tts-v2
  namespace: smartshop
  labels:
    app: orpheus-turkish-tts
    kueue.x-k8s.io/queue-name: smartshop-training
spec:
  labels:
    kueue.x-k8s.io/queue-name: smartshop-training
  runtimeRef:
    apiGroup: trainer.kubeflow.org
    kind: ClusterTrainingRuntime
    name: torch-distributed-cuda130-torch210-py312
  trainer:
    numNodes: 2
    numProcPerNode: "gpu"
    resourcesPerNode:
      requests:
        cpu: "8"
        memory: "48Gi"
        nvidia.com/gpu: "1"
      limits:
        cpu: "16"
        memory: "64Gi"
        nvidia.com/gpu: "1"
    command:
      - bash
      - -c
      - |
        DEPS=/data/orpheus/deps-v2
        DEPS_VER="v11"
        mkdir -p $DEPS
        if [ "${PET_NODE_RANK:-0}" = "0" ]; then
          if ! [ -f $DEPS/.version ] || [ "$(cat $DEPS/.version)" != "$DEPS_VER" ]; then
            echo "[deps] Node 0 installing $DEPS_VER into $DEPS …"
            rm -rf "$DEPS"/*
            pip install -q --target $DEPS \
              --index-url https://pypi.org/simple/ \
              "tiktoken>=0.5.0" soundfile librosa einops jiwer more-itertools ffmpeg-python
            pip install -q --target $DEPS --no-deps \
              --index-url https://pypi.org/simple/ \
              "snac==1.2.1" openai-whisper peft
            python3 -c "import sys; sys.path.insert(0,'$DEPS'); import tiktoken; assert hasattr(tiktoken,'Encoding')"
            echo "$DEPS_VER" > $DEPS/.version
            echo "[deps] Install verified."
          fi
        else
          echo "[deps] Node ${PET_NODE_RANK} waiting for deps …"
          until [ -f $DEPS/.version ] && [ "$(cat $DEPS/.version)" = "$DEPS_VER" ]; do sleep 5; done
        fi
        export PYTHONPATH=$DEPS:$PYTHONPATH

        PREP_SENTINEL=/data/orpheus/checkpoints/preprocessed/.done
        echo "[preprocess] Waiting for dataset sentinel (node ${PET_NODE_RANK:-0}) …"
        until [ -f $PREP_SENTINEL ]; do sleep 10; done
        echo "[preprocess] Dataset ready — starting torchrun."

        torchrun /orpheus-scripts/train_orpheus.py
    env:
      - name: CHECKPOINT_DIR
        value: /data/orpheus/checkpoints/turkish-v2
      - name: HF_HOME
        value: /data/orpheus/hf-cache
      - name: BASE_MODEL
        value: "unsloth/orpheus-3b-0.1-pretrained"
      - name: HF_DATASET
        value: "afkfatih/turkish-tts-combined-raw"
      - name: BATCH_SIZE
        value: "2"
      - name: GRAD_ACCUM
        value: "4"
      - name: LEARNING_RATE
        value: "2e-5"
      - name: NUM_EPOCHS
        value: "8"
      - name: MAX_SEQ_LEN
        value: "4096"
      - name: PREPROCESS_SAMPLES
        value: "20000"
      - name: MAX_TRAIN_SAMPLES
        value: "20000"
      - name: SAVE_STEPS
        value: "800"
      - name: LOGGING_STEPS
        value: "10"
      - name: EVAL_STEPS
        value: "200"
      - name: AUDIO_LOG_STEPS
        value: "400"
      - name: WARMUP_RATIO
        value: "0.1"
      - name: LORA_R
        value: "32"
      - name: LORA_ALPHA
        value: "64"
      - name: LORA_DROPOUT
        value: "0.05"
      - name: WHISPER_MODEL
        value: "small"
      - name: MLFLOW_PLATFORM
        value: "openshift-ai/kubeflow-trainer-v2/orpheus"
      - name: PYTHONUNBUFFERED
        value: "1"
      - name: TQDM_DISABLE
        value: "1"
      - name: MLFLOW_TRACKING_URI
        value: "https://rh-ai.apps.oai-kft-ibm.ibm.rh-ods.com/mlflow"
      - name: MLFLOW_TRACKING_INSECURE_TLS
        value: "true"
      - name: MLFLOW_TRACKING_AUTH
        value: "kubernetes-namespaced"
      - name: MLFLOW_EXPERIMENT
        value: orpheus-turkish-tts
      - name: MLFLOW_TRACKING_TOKEN
        valueFrom:
          secretKeyRef:
            name: smartshop-mlflow-token
            key: MLFLOW_TRACKING_TOKEN
      - name: PYTORCH_CUDA_ALLOC_CONF
        value: "expandable_segments:True"
      - name: NCCL_BUFFSIZE
        value: "65536"
      - name: NCCL_SOCKET_NTHREADS
        value: "1"
      - name: NCCL_NSOCKS_PERTHREAD
        value: "1"
      - name: NCCL_P2P_DISABLE
        value: "1"
      - name: NCCL_SHM_DISABLE
        value: "1"
      - name: NCCL_DEBUG
        value: "WARN"
      - name: HF_TOKEN
        valueFrom:
          secretKeyRef:
            name: hf-credentials
            key: token

  podTemplateOverrides:
    - targetJobs:
        - name: node
      spec:
        serviceAccountName: smartshop-training
        nodeSelector:
          nvidia.com/gpu.present: "true"
        containers:
          - name: node
            volumeMounts:
              - name: data
                mountPath: /data
              - name: orpheus-scripts
                mountPath: /orpheus-scripts
              - name: shm
                mountPath: /dev/shm
        volumes:
          - name: data
            persistentVolumeClaim:
              claimName: orpheus-tts-storage
          - name: orpheus-scripts
            configMap:
              name: orpheus-tts-scripts
              defaultMode: 0755
          - name: shm
            emptyDir:
              medium: Memory
              sizeLimit: "8Gi"
